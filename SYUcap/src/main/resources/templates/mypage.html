<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>모두의 공강 - 마이페이지</title>
    <link rel="stylesheet" th:href="@{/app.css}">
</head>
<body>
<header class="topbar">
    <div class="center">⏱️</div>
    <h1>모두의 공강</h1>
</header>

<style>
    /* --- 마이페이지 전용 스타일 --- */
    .circle-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 60px;
      margin-bottom: 40px;
    }
    .circle-item {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #111827;
      transition: all 0.2s ease;
    }
    .circle-item:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
    }
    .circle-content { text-align: center; }
    .circle-icon { font-size: 38px; margin-bottom: 8px; }
    .circle-item h3 { font-size: 18px; margin: 4px 0; }
    .circle-item p { font-size: 14px; color: #6b7280; }

    .logout-wrap {
      display: flex;
      justify-content: center;
    }
    .logout-btn {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 10px;
      background: #fee2e2;
      color: #b91c1c;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.2s ease;
    }
    .logout-btn:hover { background: #fecaca; }
</style>
</head>

<body>


<main class="container" style="max-width:960px;margin:0 auto;padding:32px;">
    <h2 class="title" style="text-align:center;margin-bottom:32px;">마이페이지</h2>

    <div class="circle-container">
        <!-- 프로필 -->
        <a th:href="@{/profile}" class="circle-item">
            <div class="circle-content">
                <div class="circle-icon">👤</div>
                <h3>프로필</h3>
                <p>이름 / 비밀번호 변경</p>
            </div>
        </a>

        <!-- 시간표 -->
        <a th:href="@{/groups}" class="circle-item">
            <div class="circle-content">
                <div class="circle-icon">📅</div>
                <h3>내 시간표</h3>
                <p>시간표 불러오기 및 관리</p>
            </div>
        </a>
    </div>

    <div class="logout-wrap">
        <a th:href="@{/logout}" class="logout-btn">로그아웃</a>
    </div>
</main>


<footer>
  <nav>
    <a th:href="@{/home}" th:classappend="${active}=='home' ? 'active' : ''">🏠&#xfe0e;<br><span>홈</span></a>
    <a th:href="@{/groups}" th:classappend="${active}=='groups' ? 'active' : ''">👥&#xfe0e;<br><span>그룹</span></a>
    <a th:href="@{/notifications}" th:classappend="${active}=='notifications' ? 'active' : ''">🔔&#xfe0e;<br><span>알림</span></a>
    <a th:href="@{/mypage}" th:classappend="${active}=='mypage' ? 'active' : ''">🙍&#xfe0e;<br><span>마이</span></a>
  </nav>
</footer>
</body>
</html>
